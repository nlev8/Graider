name: GraiderCompanion
options:
  bundleIdPrefix: com.graider
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

targets:
  GraiderCompanion:
    type: application
    platform: iOS
    sources:
      - path: GraiderCompanion
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Graider uses the microphone to listen for student names and behavior events using on-device speech recognition. No audio leaves your device."
        INFOPLIST_KEY_UIBackgroundModes: "audio"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Graider"
        SUPPORTS_MACCATALYST: false
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
    dependencies:
      - package: Supabase
      - package: WhisperKit
      - target: GraiderCompanionWidget
        embed: true

  GraiderCompanionWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: GraiderCompanionWidget
      - path: GraiderCompanion/LiveActivity
    settings:
      base:
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
        SWIFT_EMIT_LOC_STRINGS: true
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework

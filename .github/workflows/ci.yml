name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Runs on PRs targeting main from ANY branch
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    env:
      FLASK_ENV: testing
      FLASK_SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest-cov
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q \
            --ignore=tests/load \
            --ignore=tests/stress \
            --ignore=tests/e2e \
            -x \
            -m "not live" \
            --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=32

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  migrations-smoke:
    name: Migrations Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: smoke
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Alembic wants the SQLAlchemy dialect prefix (+psycopg) to pick
      # the driver. psql rejects that prefix and falls back to a local
      # socket, so it gets the plain libpq form. Two env vars, same DB.
      ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:smoke@localhost:5432/smoke
      PSQL_URL: postgresql://postgres:smoke@localhost:5432/smoke

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Seed Supabase auth stubs
        run: psql "$PSQL_URL" -v ON_ERROR_STOP=1 -f .github/ci/supabase_stubs.sql

      - name: Apply migrations
        run: alembic upgrade head

      - name: Show current revision
        run: alembic current --verbose

name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Runs on PRs targeting main from ANY branch
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    env:
      FLASK_ENV: testing
      FLASK_SECRET_KEY: ci-test-secret-key
      SUPABASE_ANON_KEY: ci-stub-anon-key-does-not-need-to-validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.txt
          pip install --require-hashes -r requirements-dev.txt

      - name: Run tests with coverage
        # NOTE: `--ignore=tests/stress` was removed — that directory has
        # never existed in the repo. The actual stress test is
        # tests/load/test_load.py::test_stress_rapid_polling (still
        # excluded transitively via --ignore=tests/load).
        run: |
          python -m pytest tests/ -q \
            --ignore=tests/load \
            --ignore=tests/e2e \
            -x \
            -m "not live" \
            --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=70

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests (with count floor)
        run: |
          cd frontend
          npx vitest run --reporter=default --reporter=json --outputFile=/tmp/vitest.json
          COUNT=$(node -e "console.log(require('/tmp/vitest.json').numTotalTests || 0)")
          FLOOR=140
          if [ "$COUNT" -lt "$FLOOR" ]; then
            echo "::error::Frontend test count ($COUNT) is below floor ($FLOOR). Tests were likely deleted."
            exit 1
          fi
          echo "::notice::Frontend test count: $COUNT (floor: $FLOOR)"

      - name: Build
        run: cd frontend && npm run build

      - name: Assert backend/static is not committed
        run: |
          if [ -n "$(git ls-files backend/static)" ]; then
            echo "::error::backend/static/ is tracked in git. It is built at deploy now and must stay gitignored — run 'git rm -r --cached backend/static' and commit."
            exit 1
          fi

  frontend-e2e-smoke:
    # Closes audit MAJOR #5 Phase 1 of GH issue #217 (Codex full-codebase
    # audit 2026-05-06): runs the Playwright health-check spec against a
    # locally-spawned backend, gating PRs on basic server/route smoke.
    # Other Playwright specs require richer fixtures (Supabase, AI keys,
    # auth flows) and stay out of the PR-gated CI for now — they're
    # intended for a future scheduled/nightly job (see Phase 3 of
    # docs/superpowers/plans/2026-05-11-audit-major5-e2e-promotion.md).
    #
    # Promoted from continue-on-error to required on 2026-05-11 after
    # 15 consecutive green runs on main (verified per-step). Branch
    # protection rule on `main` includes this job in required_status_checks.
    name: Frontend E2E Smoke
    runs-on: ubuntu-latest
    needs: [frontend-build]
    env:
      # Skip the production-only Redis hard-fail at boot
      # (backend/extensions.py:19 only requires REDIS_URL when
      # FLASK_ENV=production).
      FLASK_ENV: development
      FLASK_SECRET_KEY: ci-test-secret-not-for-production
      # Stub OpenAI to avoid live calls — health-check.spec.js does
      # not exercise grading paths.
      OPENAI_API_KEY: sk-ci-stub
      # Match the venv path documented in playwright.config.js so the
      # PYTHON env override falls through to the system python.
      PYTHON: python3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: pip install --require-hashes -r requirements.txt

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E health-check smoke
        # Run ONLY health-check.spec.js — it doesn't need real keys
        # or seeded data. Other specs are deferred to a future
        # nightly/scheduled job per audit guidance.
        # Use list+html reporter combo so failure artifacts populate
        # the html report directory uploaded below.
        run: cd frontend && npx playwright test e2e/health-check.spec.js --reporter=list,html

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  frontend-e2e-extended:
    # Hardening sprint PR5 (e2e de-skip wave 1): runs the 5 promoted
    # Playwright specs whose `test.skip(!joinCode)` masks were replaced
    # with real API-driven fixtures (helpers.publishAssessmentStrict).
    # The backend is spawned with GRAIDER_FAKE_SUPABASE=1 (test-only,
    # dev-mode-gated hook in backend/supabase_client.py) so the join-code
    # publish → student-take → results flow runs hermetically against the
    # in-memory fake in backend/testing/fake_supabase.py — no live
    # Supabase project, no AI keys (MC/TF/matching grading is
    # deterministic; the one short-answer submit exercises the
    # celery-enqueue-failure → thread-grading fallback, whose background
    # AI call fails harmlessly against the stub key).
    #
    # NON-REQUIRED on creation. Promotion playbook (mirrors the 2026-05-11
    # Frontend E2E Smoke promotion): observe >=15 consecutive green runs
    # on main, then an admin adds "Frontend E2E Extended" to the branch
    # protection required_status_checks. Do NOT rename this job without
    # updating that rule (see CLAUDE.md "CI job names are locked").
    name: Frontend E2E Extended
    runs-on: ubuntu-latest
    needs: [frontend-build]
    env:
      FLASK_ENV: development
      FLASK_SECRET_KEY: ci-test-secret-not-for-production
      # Stub OpenAI — promoted specs never need a real grading model.
      OPENAI_API_KEY: sk-ci-stub
      # Activate the in-memory Supabase fake (fail-closed: the gate
      # raises unless FLASK_ENV is a dev/test value).
      GRAIDER_FAKE_SUPABASE: '1'
      # Intentionally unreachable broker: a short-answer submission's
      # grade_portal_submission.delay() must hit the documented
      # kombu OperationalError fallback (student_portal_routes.py)
      # instead of crashing on the missing-CELERY_BROKER_URL import
      # guard in backend/celery_app.py.
      CELERY_BROKER_URL: redis://127.0.0.1:6390/1
      PYTHON: python3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: pip install --require-hashes -r requirements.txt

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Guard — promoted specs contain zero conditional skips
        # The whole point of PR5 is removing silent-skip masking. If a
        # test.skip( creeps back into a promoted spec, fail loudly here
        # rather than letting the suite go green by skipping.
        run: |
          if grep -n 'test\.skip(' \
            frontend/e2e/student-mc-grading.spec.js \
            frontend/e2e/student-tf-grading.spec.js \
            frontend/e2e/student-matching.spec.js \
            frontend/e2e/student-error-states.spec.js \
            frontend/e2e/student-portal.spec.js; then
            echo "::error::Promoted e2e specs must not contain test.skip( — masks were removed in PR5"
            exit 1
          fi

      - name: Run promoted E2E specs
        # --workers=1: single shared backend + shared in-memory store +
        # per-route rate limits (10/min on /api/student/submit) — serial
        # execution keeps submit cadence under the limiter and avoids
        # cross-spec state races (same reasoning as e2e-nightly.yml).
        run: |
          cd frontend && npx playwright test \
            e2e/student-mc-grading.spec.js \
            e2e/student-tf-grading.spec.js \
            e2e/student-matching.spec.js \
            e2e/student-error-states.spec.js \
            e2e/student-portal.spec.js \
            --workers=1 \
            --reporter=list,html \
            --trace=retain-on-failure

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-extended
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  migrations-smoke:
    name: Migrations Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: smoke
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Alembic wants the SQLAlchemy dialect prefix (+psycopg) to pick
      # the driver. psql rejects that prefix and falls back to a local
      # socket, so it gets the plain libpq form. Two env vars, same DB.
      ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:smoke@localhost:5432/smoke
      PSQL_URL: postgresql://postgres:smoke@localhost:5432/smoke

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --require-hashes -r requirements.txt

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Seed Supabase auth stubs
        run: psql "$PSQL_URL" -v ON_ERROR_STOP=1 -f .github/ci/supabase_stubs.sql

      - name: Apply base schema
        # Forward Alembic migrations (0002+) ALTER real tables, so the
        # base schema must exist first. Same SCHEMA_APPLY_ORDER as
        # tests/test_schema_tightening_applies.py / test_rls_migration_applies.py.
        run: |
          for f in supabase_student_portal_schema.sql \
                   backend/database/supabase_schema.sql \
                   backend/database/supabase_teacher_schema.sql \
                   supabase_submission_confirmations.sql \
                   supabase_roster_rls.sql; do
            psql "$PSQL_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Apply migrations
        run: alembic upgrade head

      - name: Show current revision
        run: alembic current --verbose

      - name: Assert dedup unique indexes exist
        # Provability gate (Data Integrity Tier 1): the forward-only
        # submission dedup constraint must be reproducible by Alembic.
        run: |
          for idx in uq_submissions_dedup_key uq_student_submissions_dedup_key; do
            psql "$PSQL_URL" -tAc "SELECT 1 FROM pg_indexes WHERE indexname='$idx';" \
              | grep -q 1 || { echo "::error::missing index $idx after alembic upgrade head"; exit 1; }
          done

  lockfile-drift-check:
    name: Lockfile Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-tools
        # Pin pip-tools version: its output format is stable within a
        # minor release but not across them. An unpinned install risks
        # false-positive drift-check failures when pip-tools updates
        # upstream (e.g., reordered `# via` annotations or header tweaks).
        run: pip install pip-tools==7.5.3

      - name: Recompile lockfiles in a tmp dir and diff against committed
        run: |
          # Snapshot committed lockfiles, then recompile in place.
          cp requirements.txt /tmp/committed-prod.txt
          cp requirements-dev.txt /tmp/committed-dev.txt
          pip-compile --generate-hashes --allow-unsafe --output-file=requirements.txt requirements.in --quiet
          pip-compile --generate-hashes --allow-unsafe --output-file=requirements-dev.txt requirements-dev.in -c requirements.txt --quiet

          # Strip comment-only lines before comparing. The actual pins
          # (package==version + --hash=sha256:...) are platform-invariant,
          # but pip-compile's "# via X" annotations differ across platforms
          # because keyring's install_requires includes SecretStorage on
          # Linux only. Stripping comment lines gives a stable diff that
          # still catches real drift (version or hash changes).
          normalize() { grep -v '^\s*#' "$1" | grep -v '^$'; }
          normalize /tmp/committed-prod.txt > /tmp/committed-prod.normalized
          normalize requirements.txt > /tmp/recompiled-prod.normalized
          normalize /tmp/committed-dev.txt > /tmp/committed-dev.normalized
          normalize requirements-dev.txt > /tmp/recompiled-dev.normalized

          diff /tmp/committed-prod.normalized /tmp/recompiled-prod.normalized || (echo "::error::requirements.txt has stale pins or hashes vs requirements.in — run pip-compile locally (Python 3.12) and commit"; exit 1)
          diff /tmp/committed-dev.normalized /tmp/recompiled-dev.normalized || (echo "::error::requirements-dev.txt has stale pins or hashes vs requirements-dev.in — run pip-compile locally (Python 3.12) and commit"; exit 1)

  ruff-lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff against backend/
        run: ruff check backend/

  mypy-strict:
    name: Mypy Strict (Critical Modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.txt
          pip install --require-hashes -r requirements-dev.txt
      - name: Run mypy on critical modules
        run: |
          mypy backend/utils/auth_decorators.py backend/utils/redaction.py backend/utils/errors.py backend/utils/ttl_cache.py backend/utils/logging_utils.py backend/observability/events.py backend/supabase_client.py backend/supabase_resilient.py backend/retry.py backend/grading/

  # ADDITIVE, NOT in the locked 9 required checks (see CLAUDE.md "CI job
  # names are locked"). Fails when docs go stale: API_REFERENCE.md endpoint
  # count drifts >5% from live routes, an ADR index entry points at a
  # missing file, or docs/MODULES.md references a deleted module path.
  # Promotion to a required check is a post-merge admin step (ADR 0006
  # promotion pattern: additive first, required after a green streak).
  docs-drift-check:
    name: Docs Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run docs drift check
        run: python scripts/check_docs_drift.py

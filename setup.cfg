[mutmut]
paths_to_mutate =
    backend/utils/auth_decorators.py
    backend/observability/events.py
    backend/supabase_client.py
    backend/supabase_resilient.py
    backend/retry.py
    backend/grading/
also_copy =
    backend/
    assignment_grader.py
# Exclude load/e2e/characterization (need a live server) AND tests marked `live`
# (need real OpenAI/Anthropic keys). mutmut runs the suite in a sandbox without
# either, so its stats phase needs a hermetic test set.
pytest_add_cli_args =
    --ignore=tests/load
    --ignore=tests/e2e
    --ignore=tests/characterization
    -m
    not live
mutate_only_covered_lines = True

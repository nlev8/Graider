[mutmut]
paths_to_mutate =
    backend/utils/auth_decorators.py
    backend/observability/events.py
    backend/supabase_client.py
    backend/supabase_resilient.py
    backend/retry.py
    backend/grading/
also_copy =
    backend/
    assignment_grader.py
# Exclude load/e2e/characterization — these require a live server and are not unit tests.
# mutmut runs the suite in a sandbox (mutants/) without a running Flask app.
pytest_add_cli_args =
    --ignore=tests/load
    --ignore=tests/e2e
    --ignore=tests/characterization
mutate_only_covered_lines = True

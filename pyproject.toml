[tool.alembic-destructive-ops]
allowlist = []

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["T20"]  # flake8-print

[tool.ruff.lint.per-file-ignores]
# Intentional print surfaces — do NOT expand this list without review. See Phase 5a PR C2.
"backend/services/outlook_sender.py" = ["T20"]  # stdout JSON IPC protocol
"backend/services/visualization.py" = ["T20"]   # local test harness
"backend/services/email_service.py" = ["T20"]   # CLI __main__ block (line ~262+) + module-level import guard
"backend/migrations/env.py" = ["T20"]           # hard-fail CLI errors to stderr
"backend/scripts/**" = ["T20"]                  # CLI scripts

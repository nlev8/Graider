providers = ["python", "node"]

# Build the Vite frontend at deploy. The deploy serves backend/static
# directly (Flask static_folder), so it must be produced here — the repo
# no longer commits it. `cd frontend && npm ci` installs the FRONTEND deps
# (the auto root `npm ci` only covers the small root package.json); the
# build emits to ../backend/static per frontend/vite.config.js.
#
# Fail-loud guards (a build that ships dummy Supabase config breaks auth
# silently — /healthz only checks the BACKEND Supabase client, so it can't
# catch it):
#   1. test -n VITE_*  → fail if the client config isn't in the BUILD env
#      (wrong Railway service/environment, not deployed, etc.).
#   2. force-feed VITE_* into the `npm run build` subshell → covers env
#      inheritance + busts the layer cache when values change.
#   3. test -s index.html → fail if no bundle was produced.
#   4. grep the built JS for the REAL url → fail if it didn't inline (the
#      'https://dummy.supabase.co' fallback literal is ALWAYS present, so we
#      grep for the configured url, not against dummy).
#
# Per-service opt-out: set `SKIP_FRONTEND_BUILD=true` on Railway services that
# don't serve the SPA (worker, Celery beat, etc.). Those services share the
# repo (and thus this nixpacks.toml) but should not pay the frontend-build
# cost AND should not require VITE_* env vars to be set. The guard prefix on
# each cmd makes the cmd a no-op when the flag is true — Docker RUN exits 0
# and the build proceeds to the next phase (start). Default (unset) preserves
# the current build for the web service.
[phases.build]
dependsOn = ["install"]
cmds = [
  "[ \"$SKIP_FRONTEND_BUILD\" = \"true\" ] && { echo '[skip-frontend-build]'; exit 0; }; test -n \"$VITE_SUPABASE_URL\" && test -n \"$VITE_SUPABASE_ANON_KEY\"",
  "[ \"$SKIP_FRONTEND_BUILD\" = \"true\" ] && { echo '[skip-frontend-build]'; exit 0; }; cd frontend && npm ci && VITE_SUPABASE_URL=\"$VITE_SUPABASE_URL\" VITE_SUPABASE_ANON_KEY=\"$VITE_SUPABASE_ANON_KEY\" npm run build",
  "[ \"$SKIP_FRONTEND_BUILD\" = \"true\" ] && { echo '[skip-frontend-build]'; exit 0; }; test -s backend/static/index.html",
  "[ \"$SKIP_FRONTEND_BUILD\" = \"true\" ] && { echo '[skip-frontend-build]'; exit 0; }; grep -Rq -- \"$VITE_SUPABASE_URL\" backend/static/assets/ || { echo 'FATAL: VITE_SUPABASE_URL not baked into bundle'; exit 1; }",
  # Install headless Chromium AND its OS-level runtime libraries for Playwright
  # PDF rendering (/api/slides/pdf). `--with-deps` makes Playwright apt-install
  # the shared libs Chromium needs, picking the correct names for the detected
  # distro — robust to the Ubuntu 24.04 "noble" t64 library renames
  # (libasound2 -> libasound2t64, etc.) that a hardcoded apt list is NOT.
  # Gated by SKIP_FRONTEND_BUILD: only the web service serves the PDF route, so
  # non-web services (worker, Celery beat) skip the ~150MB download + apt install
  # they'd never use — and don't fail on it. Operator (Hard Rule #8): after
  # deploy, generate a deck and download the PDF against the live Railway image
  # to confirm Chromium actually launches.
  "[ \"$SKIP_FRONTEND_BUILD\" = \"true\" ] && { echo '[skip-chromium-install]'; exit 0; }; python -m playwright install --with-deps chromium",
]

[start]
cmd = "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT"
